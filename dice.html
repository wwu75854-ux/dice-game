<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摇骰子 - 双人对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .players-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .player-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            min-width: 280px;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .player-box.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: #FFD700;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .player-name {
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .player-score {
            color: #FFD700;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .dice-container {
            perspective: 600px;
            margin-bottom: 15px;
        }

        .dice {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
            position: relative;
        }

        .dice.rolling {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.1); }
        }

        .dice-face {
            font-size: 60px;
            font-weight: bold;
            color: #333;
        }

        .dice.hidden::after {
            content: '❓';
            font-size: 60px;
            position: absolute;
            background: white;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .roll-btn {
            padding: 12px 40px;
            font-size: 1.3rem;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 10px;
        }

        .roll-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .roll-btn.rolled {
            background: #4CAF50;
            color: white;
        }

        .status-text {
            color: #FFD700;
            font-size: 1.1rem;
            margin-top: 8px;
            min-height: 24px;
        }

        .round-result {
            color: white;
            font-size: 1.6rem;
            margin: 20px 0;
            min-height: 50px;
            font-weight: bold;
            background: rgba(255, 215, 0, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            display: inline-block;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reveal-btn {
            padding: 12px 40px;
            font-size: 1.4rem;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .reveal-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5);
        }

        .reveal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .reset-btn:hover {
            background: white;
            color: #764ba2;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 摇骰子 - 双人对战</h1>
        
        <div class="instructions">
            各自摇骰子，然后一起揭晓！
        </div>

        <div class="players-container">
            <div class="player-box active" id="player1Box">
                <div class="player-name">玩家 1</div>
                <div class="player-score" id="score1">0</div>
                <div class="dice-container">
                    <div class="dice hidden" id="dice1">
                        <span class="dice-face" id="diceFace1">?</span>
                    </div>
                </div>
                <button class="roll-btn" id="rollBtn1">🎲 摇骰子</button>
                <div class="status-text" id="status1"></div>
            </div>

            <div class="player-box" id="player2Box">
                <div class="player-name">玩家 2</div>
                <div class="player-score" id="score2">0</div>
                <div class="dice-container">
                    <div class="dice hidden" id="dice2">
                        <span class="dice-face" id="diceFace2">?</span>
                    </div>
                </div>
                <button class="roll-btn" id="rollBtn2">🎲 摇骰子</button>
                <div class="status-text" id="status2"></div>
            </div>
        </div>

        <div class="round-result" id="roundResult"></div>

        <div class="controls">
            <button class="reveal-btn" id="revealBtn" disabled>🔍 揭晓结果</button>
            <button class="reset-btn" id="resetBtn">重新开始</button>
        </div>
    </div>

    <script>
        const dice1 = document.getElementById('dice1');
        const dice2 = document.getElementById('dice2');
        const diceFace1 = document.getElementById('diceFace1');
        const diceFace2 = document.getElementById('diceFace2');
        const rollBtn1 = document.getElementById('rollBtn1');
        const rollBtn2 = document.getElementById('rollBtn2');
        const revealBtn = document.getElementById('revealBtn');
        const resetBtn = document.getElementById('resetBtn');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const status1 = document.getElementById('status1');
        const status2 = document.getElementById('status2');
        const roundResult = document.getElementById('roundResult');

        const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        
        let score1 = 0;
        let score2 = 0;
        let player1Rolled = false;
        let player2Rolled = false;
        let player1Result = null;
        let player2Result = null;

        function rollDice(playerNum) {
            if (playerNum === 1 && player1Rolled) return;
            if (playerNum === 2 && player2Rolled) return;
            
            const currentDice = playerNum === 1 ? dice1 : dice2;
            const currentDiceFace = playerNum === 1 ? diceFace1 : diceFace2;
            const currentBtn = playerNum === 1 ? rollBtn1 : rollBtn2;
            const currentStatus = playerNum === 1 ? status1 : status2;
            
            currentBtn.disabled = true;
            
            currentDice.classList.add('rolling');
            currentDice.classList.remove('hidden');
            
            let rollCount = 0;
            const rollInterval = setInterval(() => {
                const randomFace = Math.floor(Math.random() * 6);
                currentDiceFace.textContent = diceEmojis[randomFace];
                rollCount++;
                
                if (rollCount >= 10) {
                    clearInterval(rollInterval);
                    
                    const finalResult = Math.floor(Math.random() * 6);
                    currentDiceFace.textContent = diceEmojis[finalResult];
                    const result = finalResult + 1;
                    
                    if (playerNum === 1) {
                        player1Result = result;
                        player1Rolled = true;
                    } else {
                        player2Result = result;
                        player2Rolled = true;
                    }
                    
                    setTimeout(() => {
                        currentDice.classList.remove('rolling');
                        currentDice.classList.add('hidden');
                        
                        currentBtn.textContent = '✅ 已摇';
                        currentBtn.classList.add('rolled');
                        currentStatus.textContent = '等待揭晓...';
                        
                        if (player1Rolled && player2Rolled) {
                            revealBtn.disabled = false;
                            revealBtn.style.animation = 'pulse 1s infinite';
                        }
                    }, 300);
                }
            }, 50);
        }

        function revealResults() {
            if (!player1Rolled || !player2Rolled) return;
            
            revealBtn.disabled = true;
            revealBtn.style.animation = '';
            
            dice1.classList.remove('hidden');
            dice2.classList.remove('hidden');
            
            score1 += player1Result;
            score2 += player2Result;
            score1El.textContent = score1;
            score2El.textContent = score2;
            
            let resultText = '';
            if (player1Result > player2Result) {
                resultText = `🏆 玩家 1 获胜！(${player1Result} vs ${player2Result})`;
                roundResult.style.background = 'rgba(76, 175, 80, 0.3)';
            } else if (player2Result > player1Result) {
                resultText = `🏆 玩家 2 获胜！(${player2Result} vs ${player1Result})`;
                roundResult.style.background = 'rgba(33, 150, 243, 0.3)';
            } else {
                resultText = `🤝 平局！(${player1Result} vs ${player2Result})`;
                roundResult.style.background = 'rgba(255, 152, 0, 0.3)';
            }
            
            roundResult.textContent = resultText;
            
            setTimeout(() => {
                resetForNextRound();
            }, 2000);
        }

        function resetForNextRound() {
            player1Rolled = false;
            player2Rolled = false;
            player1Result = null;
            player2Result = null;
            
            rollBtn1.disabled = false;
            rollBtn2.disabled = false;
            rollBtn1.textContent = '🎲 摇骰子';
            rollBtn2.textContent = '🎲 摇骰子';
            rollBtn1.classList.remove('rolled');
            rollBtn2.classList.remove('rolled');
            
            diceFace1.textContent = '?';
            diceFace2.textContent = '?';
            dice1.classList.add('hidden');
            dice2.classList.add('hidden');
            
            status1.textContent = '';
            status2.textContent = '';
            roundResult.textContent = '';
            roundResult.style.background = 'rgba(255, 215, 0, 0.2)';
        }

        function resetGame() {
            score1 = 0;
            score2 = 0;
            score1El.textContent = '0';
            score2El.textContent = '0';
            resetForNextRound();
        }

        rollBtn1.addEventListener('click', () => rollDice(1));
        rollBtn2.addEventListener('click', () => rollDice(2));
        revealBtn.addEventListener('click', revealResults);
        resetBtn.addEventListener('click', resetGame);

        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.08); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
